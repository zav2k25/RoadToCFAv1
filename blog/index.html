<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Portfolio Blog — The Long Game</title>
  <meta name="description" content="Portfolio updates and market commentary from The Long Game.">
  <link rel="icon" href="../img/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .blog-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 0.5rem;
    }

    .blog-table thead th {
      text-align: left;
      padding: 0 1rem 0.75rem 0;
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border-mid);
      color: var(--muted);
      font-weight: 400;
    }

    .blog-table tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }

    .blog-table tbody tr:hover { background: var(--surface-2); }

    .blog-table td {
      padding: 1.25rem 1rem 1.25rem 0;
      vertical-align: middle;
    }

    .col-month {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      white-space: nowrap;
      width: 7rem;
    }

    .col-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
    }

    .col-summary {
      font-size: 0.875rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .col-link {
      text-align: right;
      white-space: nowrap;
      padding-right: 0;
    }

    .col-link a {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.06em;
      font-weight: 500;
      color: var(--accent);
      text-decoration: none;
      border: 1px solid var(--border-mid);
      padding: 0.3rem 0.7rem;
      border-radius: 3px;
      transition: background 0.15s, border-color 0.15s;
    }

    .col-link a:hover {
      background: var(--accent-lt);
      border-color: var(--accent);
    }

    .empty-state {
      padding: 3rem 0;
      font-size: 0.875rem;
      color: var(--muted);
      opacity: 0.6;
    }

    @media (max-width: 640px) {
      .col-summary { display: none; }
    }
  </style>
</head>
<body>

<header class="site-header">
  <nav class="nav container" aria-label="Primary">
    <button class="hamburger" id="hamburger" aria-label="Toggle menu" aria-expanded="false" aria-controls="menu">☰</button>
    <ul id="menu" class="menu">
      <li><a href="../index.html">Home</a></li>
      <li><a href="../notes/index.html">Research</a></li>
      <li><a href="../thematic/index.html">Thematic</a></li>
      <li><a href="index.html">Blog</a></li>
      <li><a href="../index.html#guides">CFA Guides</a></li>
      <li><a href="../index.html#about">About</a></li>
    </ul>
  </nav>
  <section class="hero container">
    <p class="hero-eyebrow">Portfolio Updates</p>
    <h1>Portfolio Blog</h1>
  </section>
</header>

<main>
  <section class="container section">
    <table class="blog-table">
      <thead>
        <tr>
          <th class="col-month">Month</th>
          <th class="col-title">Title</th>
          <th class="col-summary">Summary</th>
          <th class="col-link"></th>
        </tr>
      </thead>
      <tbody>

        <!-- Add posts here:
        <tr>
          <td class="col-month">Jun 2026</td>
          <td class="col-title">June 2026</td>
          <td class="col-summary">Brief description.</td>
          <td class="col-link"><a href="pdfs/june-2026.pdf" target="_blank" rel="noopener">View ↗</a></td>
        </tr>
        -->

        <tr>
          <td colspan="4" class="empty-state">First post coming soon.</td>
        </tr>

      </tbody>
    </table>
  </section>
</main>

<footer class="container footer-inner">
  <p>© 2025 The Long Game.</p>
</footer>

<script src="../js/main.js"></script>
</body>
</html>
